name: Firebase App Distribution

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "App Version Code"
        required: true
        default: "1"
      release_notes:
        description: "Release notes for testers"
        required: false
        default: "New build available for testing."
      tester_groups:
        description: "Tester group alias (comma-separated)"
        required: false
        default: "qa-team"

jobs:
  distribute:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------
      # Checkout Code
      # ----------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ----------------------------------------------
      # Java & Android SDK
      # ----------------------------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK components
        run: |
          sdkmanager --update
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;36.0.0"

      # ----------------------------------------------
      # Decode Keystore
      # ----------------------------------------------
      - name: Decode Keystore
        run: |
          mkdir -p app/keystores
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystores/cicd-keystore.jks

      # ----------------------------------------------
      # Gradle Setup
      # ----------------------------------------------
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ----------------------------------------------
      # Clean & Build Release APK
      # ----------------------------------------------
      - name: Clean
        run: ./gradlew clean --stacktrace
        env:
          KEYSTORE_PATH: keystores/cicd-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: keystores/cicd-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.event.inputs.version_code }}

      # ----------------------------------------------
      # Verify APK Output
      # ----------------------------------------------
      - name: Verify APK exists
        run: |
          echo "Generated APK files:"
          ls -R app/build/outputs/apk/release/

      # ----------------------------------------------
      # Upload to Firebase App Distribution
      # ----------------------------------------------
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ github.event.inputs.tester_groups }}
          releaseNotes: "${{ github.event.inputs.release_notes }} | Version: 1.0.${{ github.event.inputs.version_code }}"
          file: app/build/outputs/apk/release/app-release.apk
